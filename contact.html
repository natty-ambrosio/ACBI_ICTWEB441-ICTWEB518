<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Bryan's Café</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#2c1a0e;">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="image/logo.svg" alt="Bryan's Café logo" height="36">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="container py-5">
    <h1 class="mb-5">Contact Us</h1>

    <div class="row g-5">

      <!-- Enquiry Form -->
      <div class="col-lg-5">
        <div class="form-section">
          <h2 class="h4 mb-4">Send an Enquiry</h2>
          <form id="enquiryForm" novalidate>
            <div class="mb-3">
              <label for="firstName" class="form-label">First Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="firstName" required>
            </div>
            <div class="mb-3">
              <label for="lastName" class="form-label">Last Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="lastName" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email Address <span class="text-danger">*</span></label>
              <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
              <label for="subject" class="form-label">Message Subject <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="subject" required>
            </div>
            <div class="mb-4">
              <label for="message" class="form-label">Message Body <span class="text-danger">*</span></label>
              <textarea class="form-control" id="message" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn w-100 text-white" style="background-color:#2c1a0e;">Submit</button>
          </form>
        </div>
      </div>

      <!-- Branch Info -->
      <div class="col-lg-7">
        <h2 class="h4 mb-4">Our Locations</h2>
        <div id="branchContainer">
          <p class="text-muted">Loading branch information…</p>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="py-3 text-center text-light">
    <p class="mb-0">@<span id="year"></span> Bryan's Café &nbsp;|&nbsp; <a href="privacy.html" target="_blank" class="text-light">Privacy Policy</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Footer year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Form submission
    document.getElementById('enquiryForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = this;
      if (!form.checkValidity()) {
        form.classList.add('was-validated');
        return;
      }
      alert('Your message has been sent.');
      form.reset();
      form.classList.remove('was-validated');
    });

    // Load branches from XML
    fetch('branches.xml')
      .then(function(response) { return response.text(); })
      .then(function(data) {
        var parser = new DOMParser();
        var xmlDoc = parser.parseFromString(data, 'text/xml');
        var branches = xmlDoc.getElementsByTagName('branch');
        var container = document.getElementById('branchContainer');
        var html = '';

        for (var i = 0; i < branches.length; i++) {
          var name    = branches[i].getElementsByTagName('name')[0].textContent;
          var address = branches[i].getElementsByTagName('address')[0].textContent;
          var phone   = branches[i].getElementsByTagName('phone')[0].textContent;
          var hours   = branches[i].getElementsByTagName('hours')[0].textContent;
          var maplink = branches[i].getElementsByTagName('maplink')[0].textContent;

          html += '<div class="card branch-card mb-3 shadow-sm">' +
            '<div class="card-body">' +
            '<h5 class="card-title">' + name + '</h5>' +
            '<p class="mb-1"><strong>Address:</strong> ' + address + '</p>' +
            '<p class="mb-1"><strong>Phone:</strong> ' + phone + '</p>' +
            '<p class="mb-2"><strong>Opening Hours:</strong> ' + hours + '</p>' +
            '<a href="' + maplink + '" target="_blank" class="btn btn-sm text-white" style="background-color:#c8a97e;">View on Google Maps</a>' +
            '</div></div>';
        }
        container.innerHTML = html;
      })
      .catch(function(err) {
        document.getElementById('branchContainer').innerHTML =
          '<p class="text-danger">Unable to load branch information. Please ensure the page is served from a web server.</p>';
      });
  </script>
</body>
</html>

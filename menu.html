<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menu - Bryan's Café</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#2c1a0e;">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="images/logo.svg" alt="Bryan's Café logo" height="36">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="container py-5">
    <h1 class="mb-2">Our Menu</h1>
    <p class="text-muted mb-4">Fresh, seasonal and locally sourced.</p>
    <div id="menuContainer"></div>
  </main>

  <!-- Footer -->
  <footer class="py-3 text-center text-light">
    <p class="mb-0">@<span id="year"></span> Bryan's Café &nbsp;|&nbsp; <a href="privacy.html" target="_blank" class="text-light">Privacy Policy</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    fetch('menu.xml')
      .then(function(response) { return response.text(); })
      .then(function(data) {
        var parser = new DOMParser();
        var xmlDoc = parser.parseFromString(data, 'text/xml');
        var sections = xmlDoc.getElementsByTagName('section');
        var container = document.getElementById('menuContainer');
        var html = '';

        for (var s = 0; s < sections.length; s++) {
          var title = sections[s].getElementsByTagName('sectionTitle')[0].textContent;
          html += '<h3 class="section-heading">' + title + '</h3>';
          html += '<div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4 mb-4">';

          var items = sections[s].getElementsByTagName('item');
          for (var i = 0; i < items.length; i++) {
            var name  = items[i].getElementsByTagName('name')[0].textContent;
            var price = items[i].getElementsByTagName('price')[0].textContent;
            var desc  = items[i].getElementsByTagName('description')[0].textContent;
            var image = items[i].getElementsByTagName('image')[0].textContent;

            html += '<div class="col">' +
              '<div class="card h-100 shadow-sm">' +
              '<img src="' + image + '" class="card-img-top menu-card-img" alt="' + name + '">' +
              '<div class="card-body">' +
              '<h5 class="card-title">' + name + '</h5>' +
              '<h6 class="card-subtitle mb-2" style="color:#c8a97e;">' + price + '</h6>' +
              '<p class="card-text text-muted small">' + desc + '</p>' +
              '</div></div></div>';
          }
          html += '</div>';
        }
        container.innerHTML = html;
      })
      .catch(function(err) {
        document.getElementById('menuContainer').innerHTML =
          '<p class="text-danger">Unable to load menu. Please ensure the page is served from a web server.</p>';
      });
  </script>
</body>
</html>

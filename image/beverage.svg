<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <rect width="400" height="260" fill="#e3f2fd"/>
  <!-- glass body -->
  <path d="M155,80 L145,210 L255,210 L245,80 Z" fill="none" stroke="#1565c0" stroke-width="4"/>
  <path d="M159,80 L150,206 L250,206 L241,80 Z" fill="#bbdefb" opacity="0.6"/>
  <!-- liquid fill -->
  <path d="M150,130 L148,206 L252,206 L250,130 Z" fill="#42a5f5" opacity="0.7"/>
  <!-- ice cubes -->
  <rect x="163" y="148" width="24" height="22" rx="3" fill="white" opacity="0.75" transform="rotate(12,175,159)"/>
  <rect x="210" y="155" width="22" height="20" rx="3" fill="white" opacity="0.75" transform="rotate(-8,221,165)"/>
  <!-- straw -->
  <rect x="220" y="60" width="8" height="148" rx="4" fill="#ef9a9a"/>
  <!-- bubbles -->
  <circle cx="170" cy="175" r="5" fill="white" opacity="0.5"/>
  <circle cx="195" cy="185" r="4" fill="white" opacity="0.5"/>
  <circle cx="225" cy="170" r="6" fill="white" opacity="0.5"/>
  <!-- straw bend -->
  <path d="M224,68 Q232,55 244,52" stroke="#ef9a9a" stroke-width="8" fill="none" stroke-linecap="round"/>
  <text x="200" y="240" font-family="Arial,sans-serif" font-size="15" fill="#1565c0" text-anchor="middle" font-weight="bold">Beverage</text>
</svg>

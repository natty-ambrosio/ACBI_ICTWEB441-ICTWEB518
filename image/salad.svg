  <rect x="170" y="128" width="12" height="8" rx="2" fill="white" opacity="0.9"/>
  <rect x="220" y="142" width="10" height="7" rx="2" fill="white" opacity="0.9"/>
  <rect x="196" y="155" width="14" height="8" rx="2" fill="white" opacity="0.9"/>
  <text x="200" y="232" font-family="Arial,sans-serif" font-size="15" fill="#388e3c" text-anchor="middle" font-weight="bold">Beetroot &amp; Feta Salad</text>
</svg>

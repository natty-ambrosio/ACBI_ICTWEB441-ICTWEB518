<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <rect width="400" height="260" fill="#fffde7"/>
  <!-- bread slice -->
  <rect x="90" y="80" width="220" height="150" rx="12" fill="#f9a825"/>
  <rect x="100" y="90" width="200" height="130" rx="8" fill="#ffcc02"/>
  <!-- avocado spread -->
  <ellipse cx="200" cy="155" rx="85" ry="55" fill="#8bc34a" opacity="0.85"/>
  <ellipse cx="200" cy="150" rx="60" ry="38" fill="#558b2f" opacity="0.7"/>
  <!-- cherry tomatoes -->
  <circle cx="160" cy="138" r="14" fill="#e53935"/>
  <circle cx="240" cy="142" r="14" fill="#e53935"/>
  <circle cx="200" cy="132" r="12" fill="#ef5350"/>
  <!-- tomato highlights -->
  <circle cx="155" cy="133" r="4" fill="#ff8a80" opacity="0.6"/>
  <circle cx="235" cy="137" r="4" fill="#ff8a80" opacity="0.6"/>
  <text x="200" y="252" font-family="Arial,sans-serif" font-size="15" fill="#558b2f" text-anchor="middle" font-weight="bold">Avocado Toast</text>
</svg>
